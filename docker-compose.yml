version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: nest-auth-db
    environment:
      POSTGRES_DB: nest_auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nest_auth_db']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest-auth-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.prod
    ports:
      - '5001:5001'
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npx prisma db push && npm run start:dev"

volumes:
  postgres_data:
